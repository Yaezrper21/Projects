<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NBS Digital Shelf - Search</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=League+Spartan:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="search">
  <div class="site-shell">
    <header class="topbar">
      <a class="brand" href="index.html">NBS Digital Shelf</a>
      <nav class="main-nav">
        <a class="nav-link" href="index.html">Home</a>
        <a class="nav-link" href="library.html">Library</a>
        <a class="nav-link" href="topup.html">Top-Up</a>
        <a class="nav-link" href="order.html">Order</a>
        <a class="nav-link active" href="search.html">Search</a>
        <a class="nav-link" href="profile.html">Profile</a>
        <a class="nav-link" href="login.html">Login</a>
        <a class="nav-link" href="signup.html">Sign Up</a>
      </nav>
    </header>

    <main>
      <section class="session-banner panel" data-session-banner></section>
      <div class="search-bar-row">
        <span class="brand-inline">NBS Digital Shelf</span>
        <input class="text-input grow" type="search" placeholder="Search..." data-search-input>
        <button class="primary-button compact" type="button" data-search-button>Search</button>
      </div>
      <section class="panel search-results" data-search-results>
        <div class="search-result">
          <p class="order-name">Loading books...</p>
          <p class="order-meta">Please wait a moment.</p>
        </div>
      </section>
      <a class="cta-strip" href="https://www.nationalbookstore.com/" target="_blank" rel="noreferrer">Access National Book Store Website</a>
    </main>
  </div>
  <script src="auth.js"></script>
  <script src="script.js"></script>
</body>
</html>
