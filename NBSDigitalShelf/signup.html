<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NBS Digital Shelf - Sign Up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=League+Spartan:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="signup">
  <div class="site-shell">
    <header class="topbar">
      <a class="brand" href="index.html">NBS Digital Shelf</a>
      <nav class="main-nav">
        <a class="nav-link" href="index.html">Home</a>
        <a class="nav-link" href="library.html">Library</a>
        <a class="nav-link" href="topup.html">Top-Up</a>
        <a class="nav-link" href="order.html">Order</a>
        <a class="nav-link" href="search.html">Search</a>
        <a class="nav-link" href="profile.html">Profile</a>
        <a class="nav-link" href="login.html">Login</a>
        <a class="nav-link active" href="signup.html">Sign Up</a>
      </nav>
    </header>

    <main class="auth-page">
      <section class="session-banner panel" data-session-banner></section>
      <section class="panel auth-panel">
        <p class="auth-title">Welcome to NBS Digital Shelf</p>
        <p class="auth-copy">Sign up with:</p>
        <div class="social-row">
          <button class="social-button" type="button" data-social="Google">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12 10.2v3.9h5.4c-.2 1.2-1.4 3.6-5.4 3.6-3.3 0-5.9-2.7-5.9-6s2.6-6 5.9-6c1.9 0 3.2.8 3.9 1.5l2.7-2.6C17 3.1 14.7 2 12 2 6.9 2 2.8 6.1 2.8 11.2S6.9 20.4 12 20.4c6.9 0 9.1-4.8 9.1-7.3 0-.5 0-.9-.1-1.3H12Z"/></svg>
            <span>Google</span>
          </button>
          <button class="social-button" type="button" data-social="Facebook">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M24 12a12 12 0 1 0-13.9 11.8v-8.3H7.1V12h3V9.4c0-3 1.8-4.6 4.4-4.6 1.3 0 2.6.2 2.6.2v2.9h-1.4c-1.4 0-1.9.9-1.9 1.8V12h3.2l-.5 3.5h-2.7v8.3A12 12 0 0 0 24 12Z"/></svg>
            <span>Facebook</span>
          </button>
        </div>
        <p class="auth-copy">or</p>
        <form class="auth-form" data-auth-form="signup">
          <input class="text-input" type="text" name="username" placeholder="Username" required>
          <input class="text-input" type="email" name="email" placeholder="Email" required>
          <input class="text-input" type="text" name="contactNumber" placeholder="Contact Number">
          <input class="text-input" type="text" name="address" placeholder="Address">
          <input class="text-input" type="password" name="password" placeholder="Password" required>
          <input class="text-input" type="password" name="confirmPassword" placeholder="Confirm Password" required>
          <label class="checkbox-row">
            <input type="checkbox" required>
            <span>I agree to create an account</span>
          </label>
          <button class="primary-button full" type="submit">Sign Up</button>
        </form>
        <p class="feedback-strip" data-auth-feedback></p>
      </section>
      <a class="cta-strip" href="https://www.nationalbookstore.com/" target="_blank" rel="noreferrer">Access National Book Store Website</a>
    </main>
  </div>
  <script src="auth.js"></script>
</body>
</html>
