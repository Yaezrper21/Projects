<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NBS Digital Shelf - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=League+Spartan:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="login">
  <div class="site-shell">
    <header class="topbar">
      <a class="brand" href="index.html">NBS Digital Shelf</a>
      <nav class="main-nav">
        <a class="nav-link" href="index.html">Home</a>
        <a class="nav-link" href="library.html">Library</a>
        <a class="nav-link" href="topup.html">Top-Up</a>
        <a class="nav-link" href="order.html">Order</a>
        <a class="nav-link" href="search.html">Search</a>
        <a class="nav-link" href="profile.html">Profile</a>
        <a class="nav-link active" href="login.html">Login</a>
        <a class="nav-link" href="signup.html">Sign Up</a>
      </nav>
    </header>

    <main class="auth-page">
      <section class="panel auth-panel">
        <p class="auth-title">Welcome to NBS Digital Shelf</p>
        <p class="auth-copy">Login in with:</p>
        <p class="auth-provider">Google / Facebook</p>
        <p class="auth-copy">or</p>
        <input class="text-input" type="email" placeholder="Email">
        <input class="text-input" type="password" placeholder="Password">
        <label class="checkbox-row">
          <input type="checkbox">
          <span>Remember me</span>
        </label>
        <button class="primary-button full">Login</button>
        <button class="ghost-button">Forgot Password</button>
      </section>
      <a class="cta-strip" href="https://www.nationalbookstore.com/" target="_blank" rel="noreferrer">Access National Book Store Website</a>
    </main>
  </div>
</body>
</html>
