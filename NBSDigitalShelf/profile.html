<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NBS Digital Shelf - Profile</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="profile">
  <div class="site-shell">
    <header class="topbar">
      <a class="brand" href="index.html">NBS DIGITAL SHELF</a>
      <nav class="main-nav">
        <a class="nav-link" href="admin.html" data-page="admin">BOOK MANAGEMENT</a>
        <a class="nav-link" href="admin.html#announcements" data-page="announcements">ANNOUNCEMENTS</a>
        <a class="nav-link" href="profile.html" data-page="profile">PROFILE</a>
      </nav>
    </header>

    <main>
      <section class="panel profile-panel">
        <p class="panel-title">PROFILE</p>
        <p class="feedback-strip align-left" data-profile-feedback></p>

        <!-- Outer box -->
        <div class="profile-box">

          <!-- Avatar section -->
          <div class="profile-section profile-section--avatar">
            <p class="profile-section-title">PROFILE AVATAR</p>
            <div class="profile-avatar-frame">
              <img
                src=""
                alt="Profile avatar"
                class="profile-avatar-image"
                data-profile-avatar
              />
            </div>

            <form class="profile-avatar-form" data-profile-avatar-form>
              <input
                type="file"
                name="avatar"
                accept="image/*"
                class="file-input"
              />
              <button type="submit" class="primary-button compact">
                Upload
              </button>
            </form>
          </div>

          <!-- Info section -->
          <form class="profile-section profile-section--info" data-profile-form>
            <div class="profile-field-row">
              <span class="profile-label">USERNAME:</span>
              <input
                type="text"
                name="username"
                class="profile-input"
                data-profile-username
              />
            </div>

            <div class="profile-field-row">
              <span class="profile-label">EMAIL ADDRESS:</span>
              <input
                type="email"
                name="email"
                class="profile-input"
                data-profile-email
                disabled
              />
            </div>

            <div class="profile-field-row">
              <span class="profile-label">CONTACT NUMBER:</span>
              <input
                type="text"
                name="contactNumber"
                class="profile-input"
                data-profile-contact
              />
            </div>

            <div class="profile-field-row">
              <span class="profile-label">ADDRESS:</span>
              <textarea
                name="address"
                rows="2"
                class="profile-input"
                data-profile-address
              ></textarea>
            </div>

            <div class="profile-field-row">
              <span class="profile-label">CHANGE PASSWORD:</span>
              <a href="login.html" class="profile-input profile-link">
                Go to password reset
              </a>
            </div>

            <div class="profile-actions">
              <button type="submit" class="primary-button">
                Save profile
              </button>
            </div>
          </form>
        </div>

        <button
          class="primary-button profile-nbs-button"
          type="button"
          onclick="window.open('https://www.nationalbookstore.com/', '_blank')"
        >
          ACCESS NATIONAL BOOKSTORE WEBSITE
        </button>
      </section>
    </main>
  </div>

  <script type="module" src="profile.js"></script>
  <script type="module" src="script.js"></script>
</body>
</html>
