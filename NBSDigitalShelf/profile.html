<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NBS Digital Shelf - Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=League+Spartan:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="profile">
  <div class="site-shell">
    <header class="topbar">
      <a class="brand" href="index.html">NBS Digital Shelf</a>
      <nav class="main-nav">
        <a class="nav-link" data-page="home" href="index.html">Home</a>
        <a class="nav-link" data-page="library" href="library.html">Library</a>
        <a class="nav-link" data-page="topup" href="topup.html">Top-Up</a>
        <a class="nav-link" data-page="order" href="order.html">Order</a>
        <a class="nav-link" data-page="search" href="search.html">Search</a>
        <a class="nav-link" data-page="profile" href="profile.html">Profile</a>
        <a class="nav-link" data-page="admin" href="admin.html">Admin Dashboard</a>
        <a class="nav-link" data-page="super-admin" href="super-admin.html">Super Admin</a>
        <a class="nav-link" data-page="login" href="login.html">Login</a>
        <a class="nav-link" data-page="signup" href="signup.html">Sign Up</a>
      </nav>
    </header>

    <main>
      <section class="session-banner panel" data-session-banner></section>

      <section class="panel">
        <p class="panel-title">Profile</p>

        <div class="profile-card">
          <div class="avatar-frame">
            <p class="panel-title">Profile Avatar</p>
            <div class="avatar-placeholder">
              <span data-profile="initials">NB</span>
            </div>
          </div>

          <div class="profile-fields">
            <p>Username: <span data-profile="username"></span></p>
            <p>Email Address: <span data-profile="email"></span></p>
            <p>Role: <span data-profile="role"></span></p>
            <p>Sign-In Type: <span data-profile="auth"></span></p>
            <p>Contact Number: <span data-profile="contact"></span></p>
            <p>Address: <span data-profile="address"></span></p>
          </div>

          <button class="primary-button full" type="button" data-logout>Logout</button>
        </div>
      </section>

      <a class="cta-strip" href="https://www.nationalbookstore.com/" target="_blank" rel="noreferrer">
        Access National Book Store Website
      </a>
    </main>
  </div>

  <script type="module" src="script.js"></script>
  <script type="module" src="auth.js"></script>
</body>
</html>
