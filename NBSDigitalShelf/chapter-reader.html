<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NBS Digital Shelf - Chapter Reader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=League+Spartan:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="chapter-reader">
  <div class="site-shell">
    <header class="topbar">
      <a class="brand" href="index.html">NBS Digital Shelf</a>
      <nav class="main-nav">
  <a class="nav-link active" href="index.html">Home</a>
  <a class="nav-link" href="library.html">Library</a>
  <a class="nav-link" href="topup.html">Top-Up</a>
  <a class="nav-link" href="order.html">Order</a>
  <a class="nav-link" href="search.html">Search</a>
  <a class="nav-link" href="profile.html">Profile</a>
  <a class="nav-link" href="admin.html">Admin Dashboard</a>
  <a class="nav-link" href="super-admin.html">Super Admin</a>
  <a class="nav-link" href="login.html">Login</a>
  <a class="nav-link" href="signup.html">Sign Up</a>

</nav>
    </header>

    <main>
      <section class="session-banner panel" data-session-banner></section>
      
      <article class="chapter-reader-page">
        <div class="reader-header">
          <div>
            <p class="panel-title" data-book-title></p>
            <h1 data-chapter-title></h1>
          </div>
        </div>

        <div class="reader-content panel">
          <div class="reader-text-box">
            <p data-chapter-text></p>
          </div>
        </div>

        <div class="reader-navigation">
          <button class="primary-button" type="button" data-prev-chapter hidden>Back</button>
          <button class="primary-button" type="button" data-next-chapter hidden>Next</button>
        </div>

        <p class="feedback-strip align-left" data-reader-feedback></p>
      </article>
    </main>
  </div>

<script type="module" src="auth.js"></script>
<script type="module" src="chapter-reader.js"></script>
<script src="script.js"></script>
</body>
</html>
