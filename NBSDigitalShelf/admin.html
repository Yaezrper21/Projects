<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NBS Digital Shelf - Admin Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=League+Spartan:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="admin">
  <div class="site-shell">
    <header class="topbar">
      <a class="brand" href="index.html">NBS Digital Shelf</a>
      <nav class="main-nav">
        <a class="nav-link" href="index.html">Home</a>
        <a class="nav-link" href="library.html">Library</a>
        <a class="nav-link" href="topup.html">Top-Up</a>
        <a class="nav-link" href="order.html">Order</a>
        <a class="nav-link" href="search.html">Search</a>
        <a class="nav-link" href="profile.html">Profile</a>
        <a class="nav-link" href="login.html">Login</a>
        <a class="nav-link" href="signup.html">Sign Up</a>
      </nav>
    </header>

    <main>
      <section class="session-banner panel" data-session-banner></section>

      <section class="panel dashboard-shell">
        <div class="dashboard-heading">
          <div>
            <p class="panel-title">Admin Dash</p>
            <h1>Book management, announcements, and profile tools.</h1>
          </div>
          <button class="ghost-button compact-ghost" type="button" data-action="logout">Logout</button>
        </div>

        <div class="dashboard-grid">
          <section class="dashboard-card">
            <p class="panel-title" data-book-editor-title>Create Book</p>
            <form class="dashboard-form" data-admin-form="book">
              <input type="hidden" name="id">
              <input class="text-input" type="text" name="title" placeholder="Book title">
              <input class="text-input" type="text" name="genre" placeholder="Genre">
              <textarea class="text-input text-area-input" name="description" placeholder="Description"></textarea>
              <input class="text-input file-input" type="file" name="image" accept="image/*">
              <button class="primary-button" type="submit">Save Book</button>
            </form>
            <div class="management-list" data-admin-books></div>
          </section>

          <section class="dashboard-card">
            <p class="panel-title">Announcements</p>
            <form class="dashboard-form" data-admin-form="announcement">
              <input class="text-input" type="text" name="title" placeholder="Announcement text">
              <button class="primary-button" type="submit">Create Announcement</button>
            </form>
            <div class="management-list" data-admin-announcements></div>
          </section>
        </div>

        <section class="dashboard-card">
          <p class="panel-title">Profile</p>
          <div data-admin-profile></div>
        </section>

        <p class="feedback-strip" data-admin-feedback></p>
      </section>

      <a class="cta-strip" href="https://www.nationalbookstore.com/" target="_blank" rel="noreferrer">Access National Book Store Website</a>
    </main>
  </div>

  <script src="auth.js"></script>
</body>
</html>
