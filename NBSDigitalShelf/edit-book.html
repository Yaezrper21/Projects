<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NBS Digital Shelf - Edit Book</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=League+Spartan:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="edit-book">
  <div class="site-shell">
    <header class="topbar">
      <a class="brand" href="index.html">NBS Digital Shelf</a>
      <nav class="main-nav">
  <a class="nav-link active" href="index.html">Home</a>
  <a class="nav-link" href="library.html">Library</a>
  <a class="nav-link" href="topup.html">Top-Up</a>
  <a class="nav-link" href="order.html">Order</a>
  <a class="nav-link" href="search.html">Search</a>
  <a class="nav-link" href="profile.html">Profile</a>
  <a class="nav-link" href="admin.html">Admin Dashboard</a>
  <a class="nav-link" href="super-admin.html">Super Admin</a>
  <a class="nav-link" href="login.html">Login</a>
  <a class="nav-link" href="signup.html">Sign Up</a>
  <button class="nav-link" type="button" data-logout>LOGOUT</button>

</nav>
    </header>

    <main>
      <section class="session-banner panel" data-session-banner></section>

      <section class="panel dashboard-shell">
        <div class="dashboard-heading">
          <div>
            <p class="panel-title">Edit Book</p>
            <h1 data-edit-book-heading>Book editor</h1>
          </div>
          <div class="table-actions wrap-actions">
            <a class="ghost-button inline" href="admin.html" data-admin-return>Back To Dashboard</a>
            <button class="ghost-button compact-ghost" type="button" data-action="logout">Logout</button>
          </div>
        </div>

        <div class="dashboard-grid">
          <section class="dashboard-card">
            <p class="panel-title" data-book-editor-title>Edit Book Details</p>
            <form class="dashboard-form" data-admin-form="book">
              <input type="hidden" name="id">
              <input class="text-input" type="text" name="title" placeholder="Book title">
              <input class="text-input" type="text" name="genre" placeholder="Genre">
              <textarea class="text-input text-area-input" name="description" placeholder="Description"></textarea>
              <div class="image-picker">
                <div class="image-picker-preview" data-image-preview>
                  <div class="image-picker-fallback">BK</div>
                </div>
                <label class="image-picker-label">
                  <span data-image-label>Select cover picture</span>
                  <input class="image-picker-input" type="file" name="image" accept="image/*" data-image-input>
                </label>
              </div>
              <button class="primary-button" type="submit">Save Book</button>
            </form>
          </section>

          <section class="dashboard-card">
            <p class="panel-title" data-chapter-book-title>Book chapters</p>
            <form class="dashboard-form" data-admin-form="chapter">
              <input type="hidden" name="bookId">
              <input type="hidden" name="chapterId">
              <input class="text-input" type="text" name="title" placeholder="Chapter title">
              <textarea class="text-input text-area-input chapter-area" name="text" placeholder="Chapter text"></textarea>
              <select class="text-input" name="accessType">
                <option value="free">Free Chapter</option>
                <option value="paid">Buyable Chapter</option>
              </select>
              <button class="primary-button" type="submit">Save Chapter</button>
            </form>
          </section>
        </div>

        <section class="dashboard-card">
          <p class="panel-title">Chapter List</p>
          <div class="management-list" data-admin-chapters></div>
        </section>

        <p class="feedback-strip align-left" data-admin-feedback></p>
      </section>
    </main>
  </div>

      <script type="module" src="auth.js"></script>
  <script type="module" src="edit-book.js"></script>
</body>
</html>
