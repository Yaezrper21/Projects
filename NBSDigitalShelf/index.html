<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NBS Digital Shelf - Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=League+Spartan:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="home">
  <div class="site-shell">
    <header class="topbar">
      <a class="brand" href="index.html">NBS Digital Shelf</a>
      <nav class="main-nav">
        <a class="nav-link active" href="index.html" data-page="home">Home</a>
        <a class="nav-link" href="library.html" data-page="library">Library</a>
        <a class="nav-link" href="topup.html" data-page="topup">Top-Up</a>
        <a class="nav-link" href="order.html" data-page="order">Order</a>
        <a class="nav-link" href="search.html" data-page="search">Search</a>
        <a class="nav-link" href="profile.html" data-page="profile">Profile</a>
        <a class="nav-link" href="admin.html" data-page="admin">Admin Dashboard</a>
        <a class="nav-link" href="super-admin.html" data-page="super-admin">Super Admin</a>
        <a class="nav-link" href="login.html" data-page="login">Login</a>
        <a class="nav-link" href="signup.html" data-page="signup">Sign Up</a>
      </nav>
    </header>

    <main>
      <section class="session-banner panel" data-session-banner></section>

      <!-- Hero: announcements + carousel in 2 columns -->
      <section class="panel hero-grid">
        <div class="panel inset">
          <p class="panel-title">Announcements</p>
          <div class="stack-list" data-announcement-list>
            <div class="list-line">Loading announcements...</div>
          </div>
        </div>

        <div class="panel feature-panel">
          <div class="hero-carousel" data-hero-carousel>
            <div class="hero-cover" data-hero-cover></div>
            <div class="hero-caption">
              <p class="eyebrow">Featured pick</p>
              <p class="hero-title" data-hero-title>Loading popular book...</p>
              <p class="hero-meta" data-hero-meta></p>
              <div class="book-actions-row">
                <button class="primary-button" type="button" data-hero-open>Open Book</button>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- Each shelf is its own full-width row -->
      <section class="panel shelf-section">
        <p class="panel-title">Most Popular</p>
        <div class="book-row" id="home-popular"></div>
        <div class="view-more-row">
          <a class="view-more-link" href="library.html#popular">View More</a>
        </div>
      </section>

      <section class="panel shelf-section">
        <p class="panel-title">Trending</p>
        <div class="book-row" id="home-trending"></div>
        <div class="view-more-row">
          <a class="view-more-link" href="library.html#trending">View More</a>
        </div>
      </section>

      <section class="panel shelf-section">
        <p class="panel-title">Latest Release</p>
        <div class="book-grid" id="home-latest"></div>
        <div class="view-more-row">
          <a class="view-more-link" href="library.html#latest">View More</a>
        </div>
      </section>

      <!-- Access NBS is its own separate row, below all shelves -->
      <a class="cta-strip" href="https://www.nationalbookstore.com/" target="_blank" rel="noreferrer">
        Access National Book Store Website
      </a>
    </main>
  </div>

  <script type="module" src="auth.js"></script>
  <script type="module" src="script.js"></script>
</body>
</html>
