<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seed Demo Books - Admin Only</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=League+Spartan:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="site-shell">
    <header class="topbar">
      <a class="brand" href="index.html">NBS Digital Shelf</a>
    </header>
    <main class="panel center">
      <h1>🔥 SEED DEMO BOOKS (Admin Only)</h1>
      <p>Login first <a href="admin.html">admin.html</a> (admin123@nbsds.com / 12345678)</p>
      <p>Then click below to add 3 sample books with free/paid chapters.</p>
      <button class="primary-button" onclick="seedBooks()">Create 3 Demo Books</button>
      <p class="feedback-strip" id="feedback" data-state="info">Ready</p>
    </main>
  </div>
  <script type="module" src="supabase-client.js"></script>
  <script type="module" src="supabase-data.js"></script>
  <script src="auth-manager.js"></script>
  <script>
async function seedBooks() {
  const feedback = document.getElementById('feedback');
  const btn = event.target;
  btn.disabled = true;
  
  try {
    feedback.textContent = 'Creating...';
    
    // Book 1: Fiction
    const book1 = await window.nbsShelfData.saveBook({
      title: 'The Digital Reader',
      genre: 'Fiction',
      description: 'A story about discovering digital worlds.'
    });
    
    await window.nbsShelfData.saveChapter({
      bookId: book1.id,
      title: 'Chapter 1: Awakening',
      text: 'Lorem ipsum dolor sit amet... (free)',
      accessType: 'free'
    });
    
    await window.nbsShelfData.saveChapter({
      bookId: book1.id,
      title: 'Chapter 2: Discovery',
      text: 'Paid chapter content...',
      accessType: 'paid'
    });
    
    // Book 2: Education
    const book2 = await window.nbsShelfData.saveBook({
      title: 'Modern JavaScript Guide',
      genre: 'Education',
      description: 'Learn ES2024 features hands-on.'
    });
    
    await window.nbsShelfData.saveChapter({
      bookId: book2.id,
      title: 'Intro to Modules',
      text: 'Free intro chapter...',
      accessType: 'free'
    });
    
    // Book 3: Romance
    const book3 = await window.nbsShelfData.saveBook({
      title: 'City Lights Love',
      genre: 'Romance',
      description: 'Two souls connect under Manila lights.'
    });
    
    await window.nbsShelfData.saveChapter({
      bookId: book3.id,
      title: 'Chapter 1: First Glance',
      text: 'Free...',
      accessType: 'free'
    });
    
    await window.nbsShelfData.saveAnnouncement('Demo books seeded! Check library.html');
    
    feedback.textContent = '✅ 3 books + 5 chapters seeded. Check library.html!';
    feedback.dataset.state = 'success';
    
  } catch (err) {
    feedback.textContent = '❌ ' + err.message;
    feedback.dataset.state = 'error';
  }
  
  btn.disabled = false;
}
  </script>
</body>
</html>
